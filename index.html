<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050504" />
    <meta name="description" content="Борговий лічильник" />
    <title>Борговий лічильник</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="screen-noise" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="hero-panel" aria-labelledby="app-title">
        <div class="hero-topline">
          <span>United States of Zakarpattia</span>
          <span id="todayStamp">Live board</span>
        </div>

        <div class="hero-layout">
          <div>
            <p class="eyebrow">Officially unofficial</p>
            <h1 id="app-title">Борговий лічильник чату</h1>
          </div>

          <div class="seal" aria-hidden="true">
            <span>IOU</span>
          </div>
        </div>

        <div class="total-block">
          <p class="total-label">Total chat debt</p>
          <div class="debt-number" id="totalDebt">0</div>
          <p class="total-subtitle">грн зафіксовано на табло</p>
        </div>

        <div class="ticker" aria-label="Бігучий рядок боргів">
          <div class="ticker-track" id="tickerTrack"></div>
        </div>
      </section>

      <section
        class="summary-grid"
        id="summaryGrid"
        aria-label="Підсумок боргів"
      ></section>

      <section class="debt-board" aria-label="Хто кому винен">
        <div class="section-heading">
          <p class="eyebrow">Who owes whom</p>
          <h2>Хто скільки винен кому</h2>
        </div>
        <div class="debt-groups" id="debtGroups"></div>
      </section>

    </main>
  </body>
</html>
